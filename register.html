<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-enter {
      animation: slide-up 0.5s ease both;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
    }

    .input-field {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
      outline: none;
    }
    .input-field::placeholder {
      color: #64748b;
    }

    .btn-submit {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      transition: all 0.3s ease;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .link-hover {
      color: #0ea5e9;
      transition: all 0.3s ease;
    }
    .link-hover:hover {
      color: #22d3ee;
      transform: translateX(4px);
    }
  </style>
</head>
<body class="page-enter">

  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="card p-8 sm:p-10 w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </div>
        <h1 class="text-4xl font-black text-slate-100 mb-2">Crear Cuenta</h1>
        <p class="text-slate-400">Regístrate para acceder a las unidades y semanas</p>
      </div>

      <form id="registerForm" class="space-y-5">
        <div>
          <input type="text" id="nombre" placeholder="Nombre completo" 
                 class="input-field w-full px-5 py-4 rounded-xl" required>
        </div>

        <div>
          <input type="email" id="correo" placeholder="Correo electrónico" 
                 class="input-field w-full px-5 py-4 rounded-xl" required>
        </div>

        <div>
          <input type="password" id="password" placeholder="Contraseña" 
                 class="input-field w-full px-5 py-4 rounded-xl" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit w-full py-4 rounded-xl text-white font-bold text-lg mt-6">
          Crear cuenta
        </button>
      </form>

      <div id="mensaje" class="mt-6 text-center min-h-[60px]"></div>

      <div class="mt-8 pt-6 border-t border-[#334155] text-center">
        <a href="iniciarsesion.html" class="link-hover inline-flex items-center gap-2 font-semibold">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          ¿Ya tienes cuenta? Inicia sesión
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="transitions.js"></script>

  <script>
    const form = document.getElementById('registerForm');
    const mensaje = document.getElementById('mensaje');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nombre = document.getElementById('nombre').value;
      const correo = document.getElementById('correo').value;
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creando cuenta...';
      mensaje.innerHTML = `<p class="text-cyan-400">Procesando...</p>`;

      const { data, error } = await supabaseClient.auth.signUp({
        email: correo,
        password: password,
        options: {
          data: { nombre: nombre },
          emailRedirectTo: window.location.origin + '/auth-callback.html'
        }
      });

      if (error) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Crear cuenta';
        mensaje.innerHTML = `<p class="text-red-400">${error.message}</p>`;
        return;
      }

      mensaje.innerHTML = `
        <div class="p-4 rounded-xl bg-green-500/10 border border-green-500/20">
          <h3 class="font-bold text-green-400 mb-2">¡Cuenta creada correctamente!</h3>
          <p class="text-slate-300 text-sm">Se envió un correo de confirmación a <strong>${correo}</strong>.</p>
        </div>
      `;
      submitBtn.textContent = 'Cuenta creada';

      setTimeout(() => navigateTo('iniciarsesion.html'), 3000);
    });
  </script>
</body>
</html>
