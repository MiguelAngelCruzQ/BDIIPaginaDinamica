<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando cuenta - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    :root {
      --dur: 300ms;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @supports (view-transition-name: none) {
      ::view-transition-old(root) {
        animation: var(--dur) var(--ease) both fade-out;
      }
      ::view-transition-new(root) {
        animation: var(--dur) var(--ease) both fade-in;
      }
    }

    @keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .page-enter {
      animation: fade-in 0.4s var(--ease) both;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
    }

    .icon-loading {
      animation: spin 1.5s linear infinite, float 2s ease-in-out infinite;
    }

    .icon-success {
      animation: float 2s ease-in-out infinite;
    }

    .icon-error {
      animation: float 2s ease-in-out infinite;
    }
  </style>
</head>
<body class="page-enter">

  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="card p-10 w-full max-w-lg text-center">
      <div id="iconoEstado" class="w-24 h-24 mx-auto mb-8 rounded-full bg-cyan-500/20 flex items-center justify-center">
        <svg class="icon-loading w-12 h-12 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </div>

      <h1 id="tituloEstado" class="text-3xl font-black text-slate-100 mb-4">
        Confirmando tu cuenta
      </h1>

      <p id="descripcionEstado" class="text-slate-400 text-lg mb-8 leading-relaxed">
        Estamos validando tu correo electrónico. No cierres esta ventana.
      </p>

      <div class="bg-cyan-500/10 rounded-xl p-5 border border-cyan-500/20 mb-6">
        <p class="text-cyan-300 text-sm leading-relaxed">
          Una vez confirmada tu cuenta, serás redirigido automáticamente al portal.
        </p>
      </div>

      <div id="mensaje" class="text-slate-400 text-sm flex items-center justify-center gap-2">
        <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        Procesando acceso...
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>

  <script>
    async function procesarCallback() {
      const titulo = document.getElementById('tituloEstado');
      const descripcion = document.getElementById('descripcionEstado');
      const mensaje = document.getElementById('mensaje');
      const icono = document.getElementById('iconoEstado');

      try {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error) throw error;

        if (data.session) {
          icono.innerHTML = `
            <svg class="icon-success w-16 h-16 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
            </svg>
          `;
          icono.className = 'w-24 h-24 mx-auto mb-8 rounded-full bg-green-500/20 flex items-center justify-center';

          titulo.innerHTML = `<span class="text-green-400">¡Cuenta confirmada!</span>`;
          descripcion.innerHTML = 'Tu cuenta ha sido activada exitosamente. Redirigiendo...';
          mensaje.innerHTML = `<span class="text-green-400">Redirigiendo en 2 segundos...</span>`;

          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        } else {
          icono.innerHTML = `
            <svg class="icon-error w-16 h-16 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          `;
          icono.className = 'w-24 h-24 mx-auto mb-8 rounded-full bg-red-500/20 flex items-center justify-center';

          titulo.innerHTML = `<span class="text-red-400">Sesión no creada</span>`;
          descripcion.innerHTML = 'Tu cuenta no pudo ser activada automáticamente.';
          mensaje.innerHTML = `
            <a href="iniciarsesion.html" class="inline-flex items-center gap-2 text-cyan-400 hover:text-cyan-300 transition">
              Ir al inicio de sesión
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
              </svg>
            </a>
          `;
        }
      } catch (err) {
        icono.innerHTML = `
          <svg class="icon-error w-16 h-16 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        `;
        icono.className = 'w-24 h-24 mx-auto mb-8 rounded-full bg-red-500/20 flex items-center justify-center';

        titulo.innerHTML = `<span class="text-red-400">Error</span>`;
        descripcion.innerHTML = 'Ocurrió un problema al confirmar tu cuenta.';
        mensaje.innerHTML = `<span class="text-red-400">${err.message}</span>`;
      }
    }

    procesarCallback();
  </script>
</body>
</html>
