<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmando cuenta - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-950 via-blue-800 to-slate-100 flex items-center justify-center px-6">

  <section class="w-full max-w-lg">
    <div class="bg-white rounded-3xl shadow-2xl p-10 border border-slate-200 text-center">

      <!-- Icono -->
      <div id="iconoEstado" class="w-20 h-20 mx-auto rounded-full bg-blue-100 flex items-center justify-center animate-pulse">
        <svg class="w-10 h-10 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>

      <!-- Título -->
      <h1 id="tituloEstado" class="mt-6 text-3xl font-extrabold text-blue-900">
        Confirmando tu cuenta...
      </h1>

      <!-- Descripción -->
      <p id="descripcionEstado" class="mt-4 text-slate-600 leading-relaxed">
        Estamos validando tu correo electrónico y creando tu sesión automáticamente.
        No cierres esta ventana.
      </p>

      <!-- Información adicional -->
      <div class="mt-8 bg-blue-50 rounded-2xl p-5 border border-blue-100">
        <p class="text-sm text-blue-800 leading-relaxed">
          Una vez confirmada tu cuenta, serás redirigido automáticamente al portal de unidades
          para visualizar y descargar los materiales académicos.
        </p>
      </div>

      <!-- Estado -->
      <div id="mensaje" class="mt-6 text-sm text-slate-500">
        Procesando acceso...
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>

  <script>
    async function procesarCallback() {
      const titulo = document.getElementById('tituloEstado');
      const descripcion = document.getElementById('descripcionEstado');
      const mensaje = document.getElementById('mensaje');
      const icono = document.getElementById('iconoEstado');

      mensaje.textContent = 'Verificando sesión...';

      try {
        const { data, error } = await supabaseClient.auth.getSession();

        if (error) {
          throw error;
        }

        if (data.session) {
          titulo.textContent = 'Cuenta confirmada correctamente';
          descripcion.textContent =
            'Tu cuenta ha sido activada y el acceso fue iniciado automáticamente.';
          mensaje.textContent = 'Redirigiendo al sistema...';

          icono.innerHTML = `
            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M5 13l4 4L19 7"/>
            </svg>
          `;
          icono.className =
            'w-20 h-20 mx-auto rounded-full bg-green-100 flex items-center justify-center';

          setTimeout(() => {
            window.location.href = 'unidades.html';
          }, 1500);

        } else {
          titulo.textContent = 'No se pudo validar la cuenta';
          descripcion.textContent =
            'Tu sesión no pudo ser creada automáticamente.';
          mensaje.innerHTML =
            '<a href="iniciarsesion.html" class="text-blue-700 font-semibold hover:underline">Ir al inicio de sesión</a>';

          icono.innerHTML = `
            <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6 18L18 6M6 6l12 12"/>
            </svg>
          `;
          icono.className =
            'w-20 h-20 mx-auto rounded-full bg-red-100 flex items-center justify-center';
        }

      } catch (err) {
        titulo.textContent = 'Error de confirmación';
        descripcion.textContent =
          'Hubo un problema al confirmar tu cuenta.';
        mensaje.textContent = err.message;
      }
    }

    procesarCallback();
  </script>
</body>
</html>
