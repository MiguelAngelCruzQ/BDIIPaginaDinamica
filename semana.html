<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semana - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    :root {
      --dur: 300ms;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @supports (view-transition-name: none) {
      ::view-transition-old(root) {
        animation: var(--dur) var(--ease) both fade-out;
      }
      ::view-transition-new(root) {
        animation: var(--dur) var(--ease) both fade-in;
      }
      ::view-transition-old(zoom) {
        animation: 400ms var(--ease) both zoom-out;
      }
      ::view-transition-new(zoom) {
        animation: 400ms var(--ease) both zoom-in;
      }
    }

    @keyframes fade-out { to { opacity: 0; transform: translateY(-8px); } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } }
    @keyframes zoom-out { to { opacity: 0; transform: scale(0.8); border-radius: 50%; } }
    @keyframes zoom-in { from { opacity: 0; transform: scale(0.1); border-radius: 50%; } }

    .page-enter {
      animation: slide-up 0.5s var(--ease) both;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }

    .btn-action {
      transition: all 0.3s ease;
    }
    .btn-action:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
    }

    .work-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
      transition: all 0.3s ease;
      overflow: hidden;
    }
    .work-card:hover {
      transform: translateY(-6px);
      border-color: #0ea5e9;
      box-shadow: 0 20px 40px -12px rgba(14, 165, 233, 0.25);
    }

    .work-card img {
      transition: transform 0.4s ease;
    }
    .work-card:hover img {
      transform: scale(1.05);
    }

    .btn-nav {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      transition: all 0.3s ease;
    }
    .btn-nav:hover {
      background: #334155;
      border-color: #0ea5e9;
      color: #0ea5e9;
    }

    .stagger > * {
      opacity: 0;
      animation: slide-up 0.5s var(--ease) forwards;
    }
    .stagger > *:nth-child(1) { animation-delay: 0.1s; }
    .stagger > *:nth-child(2) { animation-delay: 0.2s; }
    .stagger > *:nth-child(3) { animation-delay: 0.3s; }
    .stagger > *:nth-child(4) { animation-delay: 0.4s; }
    .stagger > *:nth-child(5) { animation-delay: 0.5s; }

    @media (max-width: 768px) {
      .work-card:hover { transform: translateY(-3px); }
    }
  </style>
</head>
<body class="page-enter">

  <header class="sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-lg border-b border-[#334155]">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
        </div>
        <span class="font-bold text-lg text-slate-100 hidden sm:block">Volver al Inicio</span>
      </a>

      <div class="flex items-center gap-3">
        <a href="#" id="backToUnidad" class="btn-nav px-4 py-2 rounded-xl text-sm font-medium hidden">← Unidad</a>
        <a href="dashboard.html" id="panelBtn" class="btn-nav px-5 py-2 rounded-xl text-sm font-medium hidden">Panel</a>
        <button id="logoutBtn" class="px-4 py-2 rounded-xl bg-red-500/20 border border-red-500/30 text-red-400 text-sm font-medium hover:bg-red-500/30 transition hidden">Salir</button>
        <a href="iniciarsesion.html" id="loginBtn" class="px-5 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white text-sm font-semibold">Iniciar sesión</a>
      </div>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
    <section class="text-center mb-16">
      <span id="semanaBadge" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-cyan-500/10 text-cyan-400 text-sm font-bold mb-6 border border-cyan-500/20">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Unidad 1 - Semana 1
      </span>
      <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-slate-100 mb-4">
        Avances de la <span class="bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">Semana <span id="numSemana">1</span></span>
      </h1>
      <p class="text-slate-400 text-lg max-w-2xl mx-auto">
        Explora los trabajos, capturas y enlaces al repositorio de esta semana.
      </p>
    </section>

    <section id="contenedorTrabajos" class="stagger grid gap-8 md:grid-cols-2 lg:grid-cols-3">
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="transitions.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const numUnidad = Number(params.get('unidad')) || 1;
    const numSemana = Number(params.get('semana')) || 1;

    document.getElementById('semanaBadge').innerHTML = `
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      Unidad ${numUnidad} - Semana ${numSemana}
    `;
    document.getElementById('numSemana').textContent = numSemana;
    document.getElementById('backToUnidad').href = `unidad.html?num=${numUnidad}`;
    document.getElementById('backToUnidad').classList.remove('hidden');

    const contenedor = document.getElementById('contenedorTrabajos');
    const panelBtn = document.getElementById('panelBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginBtn = document.getElementById('loginBtn');

    function obtenerIcono(nombre) {
      if (!nombre) return `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>`;
      const ext = nombre.split('.').pop().toLowerCase();
      if (['pdf'].includes(ext)) return `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>`;
      return `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>`;
    }

    function crearCard(trabajo) {
      return `
        <article class="work-card">
          ${trabajo.imagen_url ? `<div class="overflow-hidden"><img src="${trabajo.imagen_url}" alt="Captura" class="w-full h-56 object-cover"></div>` : ''}
          <div class="p-6">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-cyan-500/20 text-cyan-400 mb-2">Semana ${trabajo.semana}</span>
                <h2 class="text-xl font-bold text-slate-100">${trabajo.titulo}</h2>
              </div>
              <span class="text-xs text-slate-500 bg-slate-800 px-3 py-1 rounded-full">${new Date(trabajo.created_at).toLocaleDateString()}</span>
            </div>
            <p class="text-slate-400 leading-relaxed mb-6">${trabajo.descripcion || 'Sin descripción'}</p>
            <div class="flex flex-wrap gap-3">
              ${trabajo.github_url ? `<a href="${trabajo.github_url}" target="_blank" class="btn-action inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white text-sm font-semibold">GitHub</a>` : ''}
              ${trabajo.archivo_url ? `<a href="${trabajo.archivo_url}" target="_blank" class="btn-action inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-cyan-500/50 text-cyan-400 text-sm font-semibold max-w-full">${obtenerIcono(trabajo.archivo_nombre)} <span class="truncate max-w-[150px]">${trabajo.archivo_nombre || 'Descargar'}</span></a>` : ''}
            </div>
          </div>
        </article>
      `;
    }

    async function init() {
      const user = await obtenerUsuarioActual();
      if (user?.profile?.rol === 'admin') {
        panelBtn.classList.remove('hidden');
      }
      if (user) {
        logoutBtn.classList.remove('hidden');
        loginBtn.classList.add('hidden');
      }

      window.currentUser = user;
      cargarSemana();
    }

    async function cargarSemana() {
      const { data, error } = await supabaseClient
        .from('trabajos_semana')
        .select('*')
        .eq('unidad', numUnidad)
        .eq('semana', numSemana)
        .order('created_at', { ascending: false });

      if (error) {
        contenedor.innerHTML = `
          <div class="col-span-full work-card p-16 text-center">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-500/20 flex items-center justify-center">
              <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
            </div>
            <h3 class="text-xl font-bold text-red-400 mb-2">Error al cargar</h3>
            <p class="text-slate-400">${error.message}</p>
          </div>
        `;
        return;
      }

      if (!data.length) {
        contenedor.innerHTML = `
          <div class="col-span-full work-card p-16 text-center">
            <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-cyan-500/10 flex items-center justify-center">
              <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
              </svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-100 mb-2">Sin trabajos registrados</h3>
            <p class="text-slate-400 mb-6">Esta semana aún no tiene avances.</p>
            ${window.currentUser ? '<a href="iniciarsesion.html" class="btn-action inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-semibold">Inicia sesión para registrar</a>' : ''}
          </div>
        `;
        return;
      }

      contenedor.innerHTML = data.map(crearCard).join('');
    }

    logoutBtn.addEventListener('click', cerrarSesion);

    init();
  </script>
</body>
</html>
