<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semana - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp .7s ease-out; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

  <!-- Header -->
  <header class="bg-blue-900 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="font-bold text-xl">Portafolio BD II</a>
      <a href="dashboard.html" class="px-4 py-2 rounded-xl bg-white text-blue-900 hover:scale-105 transition">Panel</a>
    </div>
  </header>

  <!-- Hero semana -->
  <section class="max-w-7xl mx-auto px-6 py-10 fade-in-up">
    <div class="bg-white rounded-3xl shadow-lg p-8 border border-slate-200">
      <p id="semanaBadge" class="inline-block px-4 py-1 rounded-full text-sm bg-blue-100 text-blue-900 font-semibold">Semana</p>
      <h1 id="tituloSemana" class="mt-4 text-4xl font-extrabold text-blue-900">Cargando semana...</h1>
      <p class="mt-3 text-slate-600 max-w-3xl">
        Aquí se muestran los trabajos, avances, capturas y enlaces al repositorio correspondientes a la semana seleccionada.
      </p>
    </div>
  </section>

  <!-- Trabajos -->
  <main class="max-w-7xl mx-auto px-6 pb-16">
    <section id="contenedorTrabajos" class="grid gap-8 md:grid-cols-2 lg:grid-cols-3">
      <!-- contenido dinámico -->
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  'https://mfrbvrksnlbxovvlklyh.supabase.co',
  'sb_publishable_wUzL2Hg-3zFMDBE1aeHfgQ_ga5sWtNo'
);

const params = new URLSearchParams(window.location.search);
const numSemana = Number(params.get('num')) || 1;

document.getElementById('semanaBadge').textContent = `Semana ${numSemana}`;
document.getElementById('tituloSemana').textContent =
  `Avances de la Semana ${numSemana}`;

const contenedor = document.getElementById('contenedorTrabajos');

function obtenerIconoArchivo(nombre) {
  if (!nombre) return '📁';

  const ext = nombre.split('.').pop().toLowerCase();

  if (['pdf'].includes(ext)) return '📄';
  if (['zip', 'rar'].includes(ext)) return '🗜️';
  if (['png', 'jpg', 'jpeg', 'webp'].includes(ext)) return '🖼️';
  if (['js', 'html', 'css', 'sql', 'java', 'py'].includes(ext)) return '💻';

  return '📁';
}

function crearCard(trabajo) {
  return `
    <article class="bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition duration-300">

      ${trabajo.imagen_url ? `
        <img
          src="${trabajo.imagen_url}"
          alt="Captura del trabajo"
          class="w-full h-64 object-cover"
        >
      ` : ''}

      <div class="p-6">
        <div class="flex justify-between items-start">
          <div>
            <span class="text-sm text-blue-700 font-semibold">
              Semana ${trabajo.semana}
            </span>

            <h2 class="text-2xl font-bold text-blue-900 mt-1">
              ${trabajo.titulo}
            </h2>
          </div>

          <span class="text-xs text-slate-400">
            ${new Date(trabajo.created_at).toLocaleDateString()}
          </span>
        </div>

        <p class="mt-4 text-slate-600 leading-relaxed">
          ${trabajo.descripcion || 'Sin descripción'}
        </p>

        <div class="mt-6 flex flex-wrap gap-3">

          ${
            trabajo.github_url
              ? `
            <a href="${trabajo.github_url}" target="_blank"
              class="px-4 py-2 bg-blue-900 text-white rounded-xl hover:bg-blue-800 transition">
              Ver GitHub
            </a>
          `
              : ''
          }

          ${
            trabajo.archivo_url
              ? `
            <a href="${trabajo.archivo_url}" target="_blank"
              download
              class="px-4 py-2 border border-blue-900 text-blue-900 rounded-xl hover:bg-blue-50 transition">
              ${obtenerIconoArchivo(trabajo.archivo_nombre)}
              Descargar ${trabajo.archivo_nombre || 'archivo'}
            </a>
          `
              : ''
          }
        </div>
      </div>
    </article>
  `;
}

async function cargarSemana() {
  const { data, error } = await supabaseClient
    .from('trabajos_semana')
    .select('*')
    .eq('semana', numSemana)
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    contenedor.innerHTML = `
      <div class="col-span-full bg-white rounded-3xl shadow-md p-10 text-center">
        <h3 class="text-2xl font-bold text-red-600">
          Error al cargar la semana
        </h3>
        <p class="mt-3 text-slate-600">
          ${error.message}
        </p>
      </div>
    `;
    return;
  }

  if (!data.length) {
    contenedor.innerHTML = `
      <div class="col-span-full bg-white rounded-3xl shadow-md p-10 text-center">
        <h3 class="text-2xl font-bold text-blue-900">
          Aún no hay trabajos registrados
        </h3>
        <p class="mt-3 text-slate-600">
          Esta semana todavía no cuenta con avances.
        </p>
      </div>
    `;
    return;
  }

  contenedor.innerHTML = data.map(crearCard).join('');
}

cargarSemana();
</script>
</body>
</html>
