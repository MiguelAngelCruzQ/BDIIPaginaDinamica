<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-enter {
      animation: slide-up 0.5s ease both;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }

    .card-form {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
    }
    .card-form:hover {
      border-color: #0ea5e9;
    }

    .input-field {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
      outline: none;
    }
    .input-field option {
      background: #1e293b;
      color: #e2e8f0;
    }

    .btn-action {
      transition: all 0.3s ease;
    }
    .btn-action:hover {
      transform: scale(1.05);
    }

    .btn-submit {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      transition: all 0.3s ease;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .work-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .work-card:hover {
      transform: translateX(4px);
      border-color: #0ea5e9;
      box-shadow: 0 15px 30px -10px rgba(14, 165, 233, 0.2);
    }

    .work-card img {
      transition: transform 0.4s ease;
    }
    .work-card:hover img {
      transform: scale(1.03);
    }

    .btn-nav {
      transition: all 0.3s ease;
    }
    .btn-nav:hover {
      background: #334155;
    }

    .stagger > * {
      opacity: 0;
      animation: slide-up 0.5s ease forwards;
    }
    .stagger > *:nth-child(1) { animation-delay: 0.1s; }
    .stagger > *:nth-child(2) { animation-delay: 0.2s; }
    .stagger > *:nth-child(3) { animation-delay: 0.3s; }
    .stagger > *:nth-child(4) { animation-delay: 0.4s; }
    .stagger > *:nth-child(5) { animation-delay: 0.5s; }

    @media (max-width: 1024px) {
      .work-card:hover { transform: translateY(-3px); }
    }
  </style>
</head>
<body class="page-enter">

  <header class="sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-lg border-b border-[#334155]">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
        </div>
        <div>
          <h1 class="font-bold text-slate-100">Dashboard</h1>
          <p class="text-xs text-slate-400 hidden sm:block">Gestión de trabajos</p>
        </div>
      </a>
      <div class="flex items-center gap-3">
        <a href="index.html" class="btn-nav px-5 py-2 rounded-xl bg-[#1e293b] border border-[#334155] text-slate-200 text-sm font-medium">Inicio</a>
        <button onclick="cerrarSesion()" class="px-4 py-2 rounded-xl bg-red-500/20 border border-red-500/30 text-red-400 text-sm font-medium hover:bg-red-500/30 transition">Salir</button>
      </div>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
    <div class="grid lg:grid-cols-3 gap-8">
      <section class="lg:col-span-1">
        <div class="card-form p-8 sticky top-28">
          <div class="flex items-center gap-4 mb-6">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
              </svg>
            </div>
            <div>
              <h2 class="text-xl font-bold text-slate-100">Nuevo trabajo</h2>
              <p class="text-slate-400 text-sm">Registra avances semanales</p>
            </div>
          </div>

          <form id="trabajoForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Unidad</label>
              <select id="unidad" class="input-field w-full px-4 py-3 rounded-xl cursor-pointer">
                <option value="1">Unidad 1</option>
                <option value="2">Unidad 2</option>
                <option value="3">Unidad 3</option>
                <option value="4">Unidad 4</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Semana</label>
              <select id="semana" class="input-field w-full px-4 py-3 rounded-xl cursor-pointer">
                <option value="1">Semana 1</option>
                <option value="2">Semana 2</option>
                <option value="3">Semana 3</option>
                <option value="4">Semana 4</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Título</label>
              <input id="titulo" type="text" class="input-field w-full px-4 py-3 rounded-xl" placeholder="Ej: Modelo relacional" required>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Descripción</label>
              <textarea id="descripcion" rows="3" class="input-field w-full px-4 py-3 rounded-xl resize-none" placeholder="Describe el avance..."></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Imagen de presentación</label>
              <input id="imagen" type="file" accept="image/*" class="input-field w-full px-4 py-3 rounded-xl text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-purple-500/20 file:text-purple-300 hover:file:bg-purple-500/30 cursor-pointer">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">URL de GitHub</label>
              <input id="github" type="url" class="input-field w-full px-4 py-3 rounded-xl" placeholder="https://github.com/...">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-300 mb-2">Archivo (PDF,ZIP,etc)</label>
              <input id="archivo" type="file" class="input-field w-full px-4 py-3 rounded-xl text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-cyan-500/20 file:text-cyan-300 hover:file:bg-cyan-500/30 cursor-pointer">
            </div>

            <button type="submit" class="btn-submit w-full py-4 rounded-xl text-white font-bold text-lg mt-6">
              Guardar trabajo
            </button>
          </form>
        </div>
      </section>

      <section class="lg:col-span-2">
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-100">Trabajos registrados</h2>
          </div>
          <span id="contador" class="px-4 py-2 rounded-full bg-cyan-500/10 text-cyan-400 text-sm font-semibold border border-cyan-500/20">0 registros</span>
        </div>

        <div id="listaTrabajos" class="stagger space-y-5"></div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="transitions.js"></script>

  <script>
    const form = document.getElementById('trabajoForm');
    const lista = document.getElementById('listaTrabajos');
    const contador = document.getElementById('contador');

    let trabajos = [];

    async function init() {
      const hasAccess = await verificarAdmin();
      if (!hasAccess) return;
      cargarTrabajos();
    }

    function renderTrabajos() {
      contador.textContent = `${trabajos.length} registros`;

      if (!trabajos.length) {
        lista.innerHTML = `
          <div class="card-form p-12 text-center">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-slate-800 flex items-center justify-center">
              <svg class="w-8 h-8 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
              </svg>
            </div>
            <p class="text-slate-400 text-lg">Aún no hay trabajos registrados</p>
            <p class="text-slate-500 text-sm mt-2">Usa el formulario para agregar tu primer trabajo</p>
          </div>
        `;
        return;
      }

      lista.innerHTML = trabajos.map(t => `
        <article class="work-card overflow-hidden">
          ${t.imagen_url ? `<div class="overflow-hidden"><img src="${t.imagen_url}" class="w-full h-48 object-cover"></div>` : ''}
          <div class="p-6">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="inline-block px-3 py-1 rounded-full text-xs font-bold bg-cyan-500/20 text-cyan-400 mb-2">U${t.unidad} - Semana ${t.semana}</span>
                <h3 class="text-xl font-bold text-slate-100">${t.titulo}</h3>
              </div>
              <button onclick="eliminarTrabajo('${t.id}')" class="btn-action px-4 py-2 rounded-xl border border-red-500/30 text-red-400 text-sm font-medium hover:bg-red-500/20">Eliminar</button>
            </div>
            <p class="text-slate-400 mb-6">${t.descripcion || 'Sin descripción'}</p>
            <div class="flex flex-wrap gap-3">
              ${t.github_url ? `<a href="${t.github_url}" target="_blank" class="btn-action inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 text-white text-sm font-semibold">GitHub</a>` : ''}
              ${t.archivo_url ? `<a href="${t.archivo_url}" target="_blank" class="btn-action inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-cyan-500/30 text-cyan-400 text-sm font-semibold hover:bg-cyan-500/10">Descargar</a>` : ''}
            </div>
          </div>
        </article>
      `).join('');
    }

    async function cargarTrabajos() {
      const { data, error } = await supabaseClient
        .from('trabajos_semana')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) { alert(error.message); return; }
      trabajos = data;
      renderTrabajos();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      const unidad = Number(document.getElementById('unidad').value);
      const semana = Number(document.getElementById('semana').value);
      const archivo = document.getElementById('archivo')?.files?.[0];
      const imagen = document.getElementById('imagen')?.files?.[0];

      const sanitizarNombre = (nombre) => nombre.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-zA-Z0-9.-]/g, '_');

      let archivoUrl = '', archivoNombre = '', imagenUrl = '';

      if (imagen) {
        const ext = imagen.name.split('.').pop();
        const nombreSanitizado = sanitizarNombre(imagen.name);
        const rutaImg = `imagenes/${Date.now()}-${nombreSanitizado}`;
        const { error: imgError } = await supabaseClient.storage.from('BDII5tociclo').upload(rutaImg, imagen);
        if (imgError) { alert('Error al subir imagen: ' + imgError.message); btn.disabled = false; btn.textContent = 'Guardar trabajo'; return; }
        const { data: imgData } = supabaseClient.storage.from('BDII5tociclo').getPublicUrl(rutaImg);
        imagenUrl = imgData.publicUrl;
      }

      if (archivo) {
        const ext = archivo.name.split('.').pop();
        const nombreSanitizado = sanitizarNombre(archivo.name);
        const ruta = `u${unidad}/s${semana}/${Date.now()}-${nombreSanitizado}`;
        const { error: upError } = await supabaseClient.storage.from('BDII5tociclo').upload(ruta, archivo);
        if (upError) { alert('Error: ' + upError.message); btn.disabled = false; btn.textContent = 'Guardar trabajo'; return; }
        const { data: urlData } = supabaseClient.storage.from('BDII5tociclo').getPublicUrl(ruta);
        archivoUrl = urlData.publicUrl;
        archivoNombre = archivo.name;
      }

      const nuevo = {
        unidad, semana,
        titulo: document.getElementById('titulo').value,
        descripcion: document.getElementById('descripcion').value,
        github_url: document.getElementById('github').value,
        imagen_url: imagenUrl,
        archivo_url: archivoUrl,
        archivo_nombre: archivoNombre
      };

      const { error } = await supabaseClient.from('trabajos_semana').insert([nuevo]);
      if (error) { alert('Error: ' + error.message); btn.disabled = false; btn.textContent = 'Guardar trabajo'; return; }

      form.reset();
      btn.disabled = false;
      btn.textContent = 'Guardar trabajo';
      cargarTrabajos();
    });

    async function eliminarTrabajo(id) {
      const { error } = await supabaseClient.from('trabajos_semana').delete().eq('id', id);
      if (error) { alert(error.message); return; }
      cargarTrabajos();
    }

    init();
  </script>
</body>
</html>
