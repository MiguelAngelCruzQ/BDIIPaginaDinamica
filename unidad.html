<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unidad - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scale-in {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    :root {
      --dur: 300ms;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @supports (view-transition-name: none) {
      ::view-transition-old(root) {
        animation: var(--dur) var(--ease) both fade-out;
      }
      ::view-transition-new(root) {
        animation: var(--dur) var(--ease) both fade-in;
      }
      ::view-transition-old(zoom) {
        animation: 400ms var(--ease) both zoom-out;
      }
      ::view-transition-new(zoom) {
        animation: 400ms var(--ease) both zoom-in;
      }
    }

    @keyframes fade-out { to { opacity: 0; transform: translateY(-8px); } }
    @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } }
    @keyframes zoom-out { to { opacity: 0; transform: scale(0.8); border-radius: 50%; } }
    @keyframes zoom-in { from { opacity: 0; transform: scale(0.1); border-radius: 50%; } }

    .page-enter {
      animation: slide-up 0.5s var(--ease) both;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      color: #e2e8f0;
    }

    .week-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    .week-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.15), rgba(6, 182, 212, 0.05));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .week-card:hover::before { opacity: 1; }
    .week-card:hover {
      transform: translateY(-6px);
      border-color: #0ea5e9;
      box-shadow: 0 20px 40px -12px rgba(14, 165, 233, 0.25);
    }

    .week-num {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-nav {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      transition: all 0.3s ease;
    }
    .btn-nav:hover {
      background: #334155;
      border-color: #0ea5e9;
      color: #0ea5e9;
    }

    .grid-cards > * {
      opacity: 0;
      animation: slide-up 0.5s var(--ease) forwards;
    }
    .grid-cards > *:nth-child(1) { animation-delay: 0.1s; }
    .grid-cards > *:nth-child(2) { animation-delay: 0.2s; }
    .grid-cards > *:nth-child(3) { animation-delay: 0.3s; }
    .grid-cards > *:nth-child(4) { animation-delay: 0.4s; }

    @media (max-width: 768px) {
      .week-card:hover { transform: translateY(-3px); }
    }
  </style>
</head>
<body class="page-enter">

  <header class="sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-lg border-b border-[#334155]">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
        </div>
        <span class="font-bold text-lg text-slate-100">Volver al Inicio</span>
      </a>
      <a href="dashboard.html" class="btn-nav px-5 py-2 rounded-xl text-sm font-medium">Panel Admin</a>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-12">
    <section class="text-center mb-16" style="view-transition-name: hero;">
      <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-cyan-500/10 text-cyan-400 text-sm font-semibold mb-6 border border-cyan-500/20">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        Unidad <span id="numUnidad">1</span>
      </span>
      <h1 class="text-4xl sm:text-5xl md:text-6xl font-black text-slate-100 mb-4">
        Semanas de la <span class="bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent">Unidad <span id="numUnidad2">1</span></span>
      </h1>
      <p class="text-slate-400 text-lg max-w-2xl mx-auto">
        Selecciona una semana para explorar los trabajos, materiales y repositorios.
      </p>
    </section>

    <section id="contenedorSemanas" class="grid-cards grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="transitions.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const numUnidad = Number(params.get('num')) || 1;

    document.getElementById('numUnidad').textContent = numUnidad;
    document.getElementById('numUnidad2').textContent = numUnidad;

    async function init() {
      const hasAccess = await verificarAccesoUnidad();
      if (!hasAccess) return;
      cargarUnidad();
    }

    function cargarUnidad() {
      const contenedor = document.getElementById('contenedorSemanas');
      let semanasHTML = '';

      for (let i = 1; i <= 4; i++) {
        semanasHTML += `
          <a href="#" onclick="irASemana(${numUnidad}, ${i}, this); return false;" 
             class="week-card relative p-6 block text-center cursor-pointer">
            <div class="relative z-10">
              <div class="week-num text-4xl font-black mb-3">${i}</div>
              <span class="text-xs text-cyan-400 font-medium uppercase tracking-wider">Semana ${i}</span>
              <h3 class="text-lg font-bold text-slate-100 mt-2">Semana ${i}</h3>
              <p class="text-slate-400 text-sm mt-2 mb-4">Avances, materiales y descargas</p>
              <span class="inline-flex items-center gap-2 text-cyan-400 font-semibold text-sm">
                Explorar
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
              </span>
            </div>
          </a>
        `;
      }

      contenedor.innerHTML = semanasHTML;
    }

    function irASemana(unidad, semana, element) {
      element.style.viewTransitionName = 'zoom';
      navigateWithZoom(`semana.html?unidad=${unidad}&semana=${semana}`, element);
    }

    init();
  </script>
</body>
</html>
