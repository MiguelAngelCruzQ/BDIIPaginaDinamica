<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
  <title>Unidad - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .8s ease-out; }
  </style>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen hidden">

  <!-- Header -->
  <header class="bg-blue-900 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="font-bold text-xl">Portafolio BD II</a>
      <a href="index.html" class="px-4 py-2 rounded-xl bg-white text-blue-900">
        Inicio
      </a>
    </div>
  </header>

  <!-- Hero -->
  <section class="max-w-7xl mx-auto px-6 py-10 fade-up">
    <div class="bg-white rounded-3xl shadow-lg p-8 border border-slate-200">
      <p id="unidadBadge"
         class="inline-block px-4 py-1 rounded-full text-sm bg-blue-100 text-blue-900 font-semibold">
        Unidad
      </p>

      <h1 id="tituloUnidad"
          class="mt-4 text-4xl font-extrabold text-blue-900">
        Cargando unidad...
      </h1>

      <p class="mt-3 text-slate-600 max-w-3xl">
        Selecciona la semana que deseas visualizar.
      </p>
    </div>
  </section>

  <!-- Semanas -->
  <main class="max-w-7xl mx-auto px-6 pb-16">
    <section id="contenedorSemanas"
             class="grid gap-6 md:grid-cols-2 lg:grid-cols-4">
    </section>
  </main>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<script>
async function verificarAcceso() {
  const { data } = await supabaseClient.auth.getSession();

  if (!data.session) {
    window.location.replace('iniciarsesion.html');
    return;
  }

  document.body.classList.remove('hidden');
  cargarUnidad();
}

function cargarUnidad() {
  const params = new URLSearchParams(window.location.search);
  const unidad = Number(params.get('num')) || 1;

  document.getElementById('unidadBadge').textContent = `Unidad ${unidad}`;
  document.getElementById('tituloUnidad').textContent = `Semanas de la Unidad ${unidad}`;

  const contenedor = document.getElementById('contenedorSemanas');

  let semanasHTML = '';

  for (let i = 1; i <= 4; i++) {
    semanasHTML += `
      <a href="semana.html?unidad=${unidad}&semana=${i}"
         class="bg-white rounded-3xl shadow-md p-6 border border-slate-200 hover:shadow-xl hover:-translate-y-1 transition duration-300 block">

        <div class="text-blue-700 text-sm font-semibold">
          Unidad ${unidad}
        </div>

        <h2 class="text-2xl font-bold mt-2">
          Semana ${i}
        </h2>

        <p class="mt-3 text-slate-600">
          Ver avances, materiales y descargas
        </p>

        <div class="mt-4 text-blue-900 font-semibold">
          Abrir →
        </div>
      </a>
    `;
  }

  contenedor.innerHTML = semanasHTML;
}

verificarAcceso();

window.addEventListener('pageshow', async function () {
  const { data } = await supabaseClient.auth.getSession();

  if (!data.session) {
    window.location.replace('iniciarsesion.html');
  }
});
</script>
</body>
</html>
