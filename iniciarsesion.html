<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
    }
    .fade-up { animation: fadeUp .8s ease-out; }
    .float { animation: float 3s ease-in-out infinite; }
    .gradient-animated {
      background: linear-gradient(-45deg, #1e3a8a, #1e40af, #3b82f6, #60a5fa, #1e3a8a);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    .login-card {
      animation: glow 3s ease-in-out infinite;
    }

    .input-field {
      transition: all 0.3s ease;
      border: 2px solid #e2e8f0;
      background: rgba(255, 255, 255, 0.9);
    }
    .input-field:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      transform: translateY(-2px);
      background: white;
    }
    .input-field::placeholder {
      color: #94a3b8;
      transition: opacity 0.3s ease;
    }
    .input-field:focus::placeholder {
      opacity: 0.5;
    }

    .btn-submit {
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: linear-gradient(135deg, #1e3a8a, #1e40af);
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.6s ease;
    }
    .btn-submit:hover::before { left: 100%; }
    .btn-submit:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 35px -10px rgba(30, 64, 175, 0.5);
      background: linear-gradient(135deg, #1e40af, #3b82f6);
    }
    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .toggle-password {
      transition: all 0.3s ease;
    }
    .toggle-password:hover {
      transform: scale(1.1);
      color: #3b82f6;
    }

    .floating-shapes .shape {
      position: absolute;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      animation: float 6s ease-in-out infinite;
    }
    .floating-shapes .shape:nth-child(1) { width: 200px; height: 200px; top: 10%; left: -5%; animation-delay: 0s; }
    .floating-shapes .shape:nth-child(2) { width: 150px; height: 150px; bottom: 20%; right: -3%; animation-delay: 2s; }
    .floating-shapes .shape:nth-child(3) { width: 100px; height: 100px; top: 60%; left: 10%; animation-delay: 4s; }

    .link-hover {
      position: relative;
      transition: all 0.3s ease;
    }
    .link-hover::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: #3b82f6;
      transition: width 0.3s ease;
    }
    .link-hover:hover::after { width: 100%; }
    .link-hover:hover { color: #3b82f6; transform: translateX(5px); }

    .icon-wrapper {
      transition: all 0.3s ease;
    }
    .input-field:focus + .icon-wrapper,
    .input-field:focus ~ .icon-wrapper {
      transform: rotate(90deg) scale(1.1);
      color: #3b82f6;
    }
  </style>
</head>

<body class="min-h-screen gradient-animated flex items-center justify-center px-6 relative overflow-hidden">

  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <section class="w-full max-w-md fade-up relative z-10">
    <div class="login-card bg-white/95 backdrop-blur-lg rounded-3xl shadow-2xl p-10 border border-white/20">
      <div class="text-center mb-8">
        <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-blue-100 flex items-center justify-center float">
          <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-4xl font-black text-blue-900">Iniciar sesión</h1>
        <p class="mt-3 text-slate-600">Accede al panel para registrar avances y trabajos</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <div class="relative">
          <label class="block text-sm font-semibold text-slate-700 mb-2">Correo institucional</label>
          <div class="relative">
            <input
              type="email"
              id="correo"
              placeholder="miguel@upla.edu.pe"
              class="input-field w-full px-5 py-4 rounded-2xl pl-12"
              required
            >
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="relative">
          <label class="block text-sm font-semibold text-slate-700 mb-2">Contraseña</label>
          <div class="relative">
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              class="input-field w-full px-5 py-4 rounded-2xl pl-12 pr-12"
              required
            >
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
            <button type="button" id="togglePass" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
              <svg id="eyeIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button
          type="submit"
          id="submitBtn"
          class="btn-submit w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg mt-8"
        >
          Entrar al dashboard
        </button>
      </form>

      <div id="mensaje" class="mt-6 text-center text-sm font-semibold min-h-[24px]"></div>

      <div class="mt-8 text-center">
        <a href="index.html" class="link-hover inline-flex items-center gap-2 text-blue-800 font-semibold">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Volver al portafolio
        </a>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>

  <script>
    const togglePass = document.getElementById('togglePass');
    const password = document.getElementById('password');
    const form = document.getElementById('loginForm');
    const mensaje = document.getElementById('mensaje');
    const submitBtn = document.getElementById('submitBtn');

    togglePass.addEventListener('click', () => {
      if (password.type === 'password') {
        password.type = 'text';
        document.getElementById('eyeIcon').innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        `;
      } else {
        password.type = 'password';
        document.getElementById('eyeIcon').innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        `;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const correo = document.getElementById('correo').value;
      const pass = password.value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Validando acceso...';
      submitBtn.style.opacity = '0.8';
      mensaje.innerHTML = `<span class="text-blue-600 animate-pulse">Validando acceso...</span>`;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: correo,
        password: pass
      });

      if (error) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar al dashboard';
        submitBtn.style.opacity = '1';
        mensaje.innerHTML = `<span class="text-red-600">${error.message}</span>`;
        return;
      }

      mensaje.innerHTML = `<span class="text-green-600">Acceso correcto ✓</span>`;
      submitBtn.textContent = 'Redirigiendo...';

      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 800);
    });
  </script>
</body>
</html>
