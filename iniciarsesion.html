<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Portafolio BD II</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-enter {
      animation: slide-up 0.5s ease both;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1.5rem;
    }

    .input-field {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: #0ea5e9;
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
      outline: none;
    }
    .input-field::placeholder {
      color: #64748b;
    }

    .btn-submit {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      transition: all 0.3s ease;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .link-hover {
      color: #0ea5e9;
      transition: all 0.3s ease;
    }
    .link-hover:hover {
      color: #22d3ee;
      transform: translateX(4px);
    }

    .toggle-password:hover {
      color: #0ea5e9;
    }
  </style>
</head>
<body class="page-enter">

  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="card p-8 sm:p-10 w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-20 h-20 mx-auto mb-6 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-4xl font-black text-slate-100 mb-2">Iniciar Sesión</h1>
        <p class="text-slate-400">Para poder subir trabajos</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <input type="email" id="correo" placeholder="Correo electrónico" 
                 class="input-field w-full px-5 py-4 rounded-xl" required>
        </div>

        <div class="relative">
          <input type="password" id="password" placeholder="Contraseña" 
                 class="input-field w-full px-5 py-4 rounded-xl pr-12" required>
          <button type="button" id="togglePass" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
            <svg id="eyeIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit w-full py-4 rounded-xl text-white font-bold text-lg mt-6">
          iniciar sesion
        </button>
      </form>

      <div id="mensaje" class="mt-6 text-center min-h-[24px]"></div>

      <div class="mt-8 pt-6 border-t border-[#334155]">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
          <a href="index.html" class="link-hover inline-flex items-center gap-2 text-sm font-semibold">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Volver al inicio
          </a>
          <a href="register.html" class="link-hover text-sm font-semibold">
            ¿No tienes una cuenta? Regístrate
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="transitions.js"></script>

  <script>
    const togglePass = document.getElementById('togglePass');
    const password = document.getElementById('password');
    const form = document.getElementById('loginForm');
    const mensaje = document.getElementById('mensaje');
    const submitBtn = document.getElementById('submitBtn');

    togglePass.addEventListener('click', () => {
      if (password.type === 'password') {
        password.type = 'text';
        document.getElementById('eyeIcon').innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        `;
      } else {
        password.type = 'password';
        document.getElementById('eyeIcon').innerHTML = `
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        `;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const correo = document.getElementById('correo').value;
      const pass = password.value;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Validando...';
      mensaje.innerHTML = `<p class="text-cyan-400">Verificando credenciales...</p>`;

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email: correo, password: pass });

      if (error) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Entrar al dashboard';
        mensaje.innerHTML = `<p class="text-red-400">${error.message}</p>`;
        return;
      }

      mensaje.innerHTML = `<p class="text-green-400">Acceso correcto ✓</p>`;
      submitBtn.textContent = 'Redirigiendo...';

      const { data: userData } = await supabaseClient.auth.getUser();
      const { data: profile } = await supabaseClient.from('profiles').select('rol').eq('id', userData.user.id).maybeSingle();

      setTimeout(() => {
        if (profile?.rol === 'admin') {
          navigateTo('dashboard.html');
        } else {
          navigateTo('index.html');
        }
      }, 800);
    });
  </script>
</body>
</html>
